[project]
name = "restic-configurator-py"
version = "0.1.0"
description = "Wrapper for restic, written in Python."
readme = "README.md"
authors = [
    { name = "Jan-Magnus Monenschein", email = "mail@janmagnus.dev" }
]
requires-python = ">=3.12"
dependencies = [
    "python-dotenv>=1.2.2",
]

[project.scripts]
restic-configurator-py = "restic_configurator_py:main"

[[tool.uv.index]]
url = "https://pypi.python.org/simple"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
